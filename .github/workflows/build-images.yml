  build-chatbot:
    runs-on: ubuntu-latest
    needs: check-if-chatbot-changed
    if: needs.check-if-chatbot-changed.outputs.chatbot_changed == 'true'
    steps:
      - name: Print message
        run: echo "Chatbot files have changed. Building and pushing chatbot Docker image..."
