name: build-images
on:
  push:
    branches:
      - automatic-image-build-publish

jobs:
  check-if-backend-changed:
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.check_backend.outputs.backend_changed }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v2

      - name: Check if backend files have changed
        id: check_backend
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^backend/'; then
            echo "backend_changed=true" >> $GITHUB_OUTPUT
          else
            echo "backend_changed=false" >> $GITHUB_OUTPUT
          fi
  
  check-if-frontend-changed:
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.check_frontend.outputs.frontend_changed }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v2

      - name: Check if frontend files have changed
        id: check_frontend
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^frontend/'; then
            echo "frontend_changed=true" >> $GITHUB_OUTPUT
          else
            echo "frontend_changed=false" >> $GITHUB_OUTPUT
          fi
  
  check-if-chatbot-changed:
    runs-on: ubuntu-latest
    outputs:
      chatbot_changed: ${{ steps.check_chatbot.outputs.chatbot_changed }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v2

      - name: Check if chatbot files have changed
        id: check_chatbot
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^chatbot/'; then
            echo "chatbot_changed=true" >> $GITHUB_OUTPUT
          else
            echo "chatbot_changed=false" >> $GITHUB_OUTPUT
          fi

  check-if-helm-chart-changed:
    runs-on: ubuntu-latest
    outputs:
      helm_chart_changed: ${{ steps.check_helm_chart.outputs.helm_chart_changed }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v2

      - name: Check if Helm chart files have changed
        id: check_helm_chart
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^helm-chart/'; then
            echo "helm_chart_changed=true" >> $GITHUB_OUTPUT
          else
            echo "helm_chart_changed=false" >> $GITHUB_OUTPUT
          fi

  helm-chart:
    runs-on: ubuntu-latest
    needs: check-if-helm-chart-changed
    if: needs.check-if-helm-chart-changed.outputs.helm_chart_changed == 'true'
    steps:
      - name: Print message
        run: echo "Helm chart files have changed. Packaging and pushing Helm chart..."
