{{- if .Values.backend.deploy_postgres }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: {{ .Values.frontend.namespace}}
  name: postgres
spec:
  serviceName: "postgres"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:14 # You can change the version here
          env:
          - name: POSTGRES_DB
            value: {{ .Values.backend.postgres_db_name }}
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_USER
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_PASSWORD
          volumeMounts:
          - name: postgres-data
            mountPath: /var/lib/postgresql/data
          - name: init-scripts
            mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: init-scripts
        configMap:
          name: postgres-init
          defaultMode: 0777 # Ensures the init script is executable
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.backend.postgres_storage_size }}
        #storageClassName: standard
{{- end }}